# =============================================================================
# BluTrain GPT-2 Training Configuration
# =============================================================================
# Change these values to configure training without modifying source code.
# Run: make run-train CONFIG=gpt2_scripts/config/train_config.cfg
#   or: make run-train-mpi CONFIG=gpt2_scripts/config/train_config.cfg NP=4
# =============================================================================

# -----------------------------------------------------------------------------
# [model] — Architecture
# -----------------------------------------------------------------------------
[model]
vocab_size     = 50304
n_embd         = 384
n_layers       = 6
n_heads        = 6
weight_tying   = false

# -----------------------------------------------------------------------------
# [training] — Hyperparameters
# -----------------------------------------------------------------------------
[training]
batch_size        = 8          # Local batch size per GPU
token_length      = 1024       # Sequence length T (also sets model context window)
global_batch_size = 65536      # Total tokens per optimizer step — fixed across ALL modes
                               # grad_accum_steps is derived: global / (B * T * dp_replicas)
max_lr            = 3e-3    # Peak learning rate
min_lr            = 3e-4    # Minimum LR (cosine decay floor, 10% of max_lr)
warmup_steps      = 676         # Linear warmup steps
max_steps         = 6767       # Total training steps
grad_clip_norm    = 1.0        # Max L2 gradient norm
seed              = 1234       # Weight init seed — same value ensures same initial weights

# Target loss thresholds (for timing milestones)
target_train_loss = 4.00
target_val_loss   = 4.00

# -----------------------------------------------------------------------------
# [optimizer] — Optimizer configuration
# -----------------------------------------------------------------------------
# Supported types: adamw, adam, sgd
[optimizer]
type         = adamw
beta1        = 0.9
beta2        = 0.95
eps          = 1e-8
weight_decay = 0.1
momentum     = 0.9             # Only used when type = sgd

# -----------------------------------------------------------------------------
# [parallelism] — Distributed training strategy
# -----------------------------------------------------------------------------
# mode: Comma-separated list of parallelism techniques to combine.
#   none          — Single GPU (no MPI needed)
#   ddp           — Data Parallel (DDP with gradient bucketing)
#   tp            — Tensor Parallel (column/row parallel sharding)
#   ddp, tp       — 2D Parallel (DDP + TP combined)
#
# Examples:
#   mode = none          # Single GPU training
#   mode = ddp           # Multi-GPU DDP
#   mode = ddp, tp       # 2D parallel (requires NP = dp_size * tp_size)
[parallelism]
mode    = none
tp_size = 2                    # Tensor parallel degree (when TP is enabled)

# -----------------------------------------------------------------------------
# [attention] — Attention mechanism
# -----------------------------------------------------------------------------
# Supported types:
#   normal             — Standard scaled dot-product attention (O(T^2) memory)
#   fmha               — Memory-efficient attention (flash-style, O(T) memory)
#   fused_tril_softmax — Fused causal tril + softmax + matmul
#   flash              — True Flash Attention (placeholder, not yet implemented)
[attention]
type = fmha

# -----------------------------------------------------------------------------
# [logging] — Training logs and metrics
# -----------------------------------------------------------------------------
[logging]
enabled   = true               # Master switch for all logging
csv       = true               # Write per-step metrics to CSV
csv_path  = Training_logs/training.csv
val_freq  = 500                # Validate every N steps
val_steps = 20                 # Number of validation batches

# -----------------------------------------------------------------------------
# [checkpointing] — Model and activation checkpointing
# -----------------------------------------------------------------------------
[checkpointing]
activation = false             # Activation checkpointing (memory vs recompute)
model      = false             # Periodic model checkpoint saving
frequency  = 5000              # Save checkpoint every N steps
directory  = checkpoints       # Checkpoint output directory
max_kept   = 5                 # Maximum checkpoints to keep on disk

# -----------------------------------------------------------------------------
# [blas] — Linear algebra backend
# -----------------------------------------------------------------------------
# use_cublas = true  -> Use NVIDIA cuBLAS
# use_cublas = false -> Use BluBridge-BLAS (BLU_BLAS)
[blas]
use_cublas = false

# -----------------------------------------------------------------------------
# [data] — Dataset paths
# -----------------------------------------------------------------------------
[data]
root        = /home/blu-bridge015/Desktop/edufineweb
max_seq_len = 100000000

# -----------------------------------------------------------------------------
# [device] — GPU device selection (single-GPU mode only)
# -----------------------------------------------------------------------------
[device]
gpu = 0
